name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup & Update
        run: |
          pacman -Syu --noconfirm git base-devel sudo
      - name: Sync AUR Packages
        run: |
          sudo -u builduser git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sudo -u builduser aur repo -a ./x86_64/tornadoos-repo.db.tar.gz
          sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm
          rm -f x86_64/*.old

      - name: Push Updates
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          git add x86_64/
          git commit -m "Automated AUR Update $(date +%Y-%m-%d)" || exit 0
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main