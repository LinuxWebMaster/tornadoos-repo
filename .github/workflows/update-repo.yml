name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *' # Midnight daily
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          pacman -Syu --noconfirm git base-devel sudo
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          # This allows the builduser to use the workspace
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chown -R builduser:builduser .

      - name: Install aurutils (Bootstrap)
        run: |
          sudo -u builduser bash -c "cd /tmp && git clone https://aur.archlinux.org/aurutils.git && cd aurutils && makepkg -si --noconfirm"

      - name: Sync AUR Packages
        run: |
          # Replace 'tornadoos-repo' with your actual .db file name if different
          sudo -u builduser aur repo --add ./x86_64/tornadoos-repo.db.tar.gz
          sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm

      - name: Push Updates
        run: |
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          git add x86_64/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated AUR Update $(date +%Y-%m-%d)"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
          fi