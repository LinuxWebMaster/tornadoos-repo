name: TornadoOS Repo Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    
    steps:
      - name: Install Git
        run: pacman -Sy --noconfirm git

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Debug: Full Workspace Inspection
        run: |
          echo "=== GITHUB_WORKSPACE: ${{ github.workspace }} ==="
          echo "=== PWD: $(pwd) ==="
          echo "=== ROOT LISTING ==="
          ls -laR "${{ github.workspace }}" 2>&1 | head -50
          echo "=== FIND .pkg.tar.zst FILES ==="
          find "${{ github.workspace }}" -name "*.pkg.tar.zst" -exec ls -lh {} \; 2>&1 || echo "None found"
          echo "=== CHECK x86_64 DIRECTLY ==="
          if [ -d "${{ github.workspace }}/x86_64" ]; then
            echo "x86_64 exists!"
            ls -la "${{ github.workspace }}/x86_64"
          else
            echo "❌ x86_64 directory does not exist!"
          fi
        shell: bash

      - name: Setup Environment
        run: |
          pacman -Sy --noconfirm base-devel sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          
          sudo -u builder git clone https://aur.archlinux.org/aurutils.git /tmp/aurutils
          sudo -u builder bash -c "cd /tmp/aurutils && makepkg -si --noconfirm"
          
          mkdir -p "${{ github.workspace }}/x86_64"
          printf "\n[tornadoos-repo]\nSigLevel = Optional TrustAll\nServer = file://%s/x86_64\n" "${{ github.workspace }}" >> /etc/pacman.conf
          
          git config --global --add safe.directory "${{ github.workspace }}"
          chown -R builduser:builduser "${{ github.workspace }}/x86_64" || true

      - name: Build Database
        run: |
          WORKSPACE="${{ github.workspace }}"
          cd "${WORKSPACE}/x86_64"
          
          echo "=== CURRENT DIR: $(pwd) ==="
          echo "=== FILES HERE ==="
          ls -la
          
          rm -f *.lck *.db* *.files*
          sudo chown -R builduser:builduser .
          
          # Use explicit file list instead of glob
          PKGS=$(ls *.pkg.tar.zst 2>/dev/null)
          if [ -n "$PKGS" ]; then
            echo "✅ Found packages: $PKGS"
            sudo -u builduser repo-add tornadoos-repo.db.tar.gz $PKGS
          else
            echo "❌ No .pkg.tar.zst files found in $(pwd)"
            echo "Full workspace listing:"
            ls -laR "${WORKSPACE}" | head -30
            exit 1
          fi

      - name: Push Changes
        run: |
          cd "${{ github.workspace }}"
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          
          cd x86_64
          git add *.pkg.tar.zst *.db.tar.gz *.files.tar.gz 2>/dev/null || true
          git rm -f *.db *.files *.lck 2>/dev/null || true
          cd ..
          
          if git commit -m "Auto-update $(date +%Y-%m-%d)"; then
            git push https://${{ secrets.TOKEN_NAME }}@github.com/LinuxWebMaster/tornadoos-repo.git HEAD:main
          fi