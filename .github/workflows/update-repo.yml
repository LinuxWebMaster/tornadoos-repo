name: Sync AUR Packages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    
    steps:
      - name: Install Git
        run: pacman -Sy --noconfirm git

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # We need credentials to push back to GitHub so Cloudflare can see the changes
          persist-credentials: true 

      - name: Sync Packages
        run: |
          pacman -Sy --noconfirm base-devel sudo
          
          # Setup aurutils
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          sudo -u builder git clone https://aur.archlinux.org/aurutils.git /tmp/aurutils
          sudo -u builder bash -c "cd /tmp/aurutils && makepkg -si --noconfirm"
          
          # Sync packages into x86_64/
          cd x86_64
          sudo -u builder aur sync --database tornadoos-repo --root . grub-customizer preload calamares

      - name: Commit and Push
        run: |
          # ✅ Fix: Tell git this directory is safe to use
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          
          # Add the new packages and databases
          git add x86_64/
          
          if git commit -m "Auto-sync $(date +%Y-%m-%d)"; then
            # Push changes. Cloudflare will see this commit and auto-deploy!
            git push https://LinuxWebMaster:${{ secrets.GH_PAT }}@github.com/LinuxWebMaster/tornadoos-repo.git HEAD:main
          else
            echo "No changes."
          fi
