name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
          # ✅ Full checkout - no sparse checkout filtering

      - name: Debug After Checkout
        run: |
          echo "=== Files after checkout ==="
          ls -la
          echo "=== x86_64 contents ==="
          ls -la x86_64/ || echo "x86_64/ not found!"
          echo "=== Package files ==="
          ls -la x86_64/*.pkg.tar.zst 2>/dev/null || echo "No packages found!"
          ls -la .git 2>&1 || echo ".git is missing!"

      - name: Setup & Update
        run: |
          # 1. Install base dependencies
          pacman -Sy --noconfirm git base-devel sudo
          
          # 2. Build and install aurutils FROM AUR
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          sudo -u builder git clone https://aur.archlinux.org/aurutils.git /tmp/aurutils
          sudo -u builder bash -c "cd /tmp/aurutils && makepkg -si --noconfirm"
          
          # 3. Add custom repo to pacman.conf
          mkdir -p "${{ github.workspace }}/x86_64"
          printf "\n[tornadoos-repo]\nSigLevel = Optional TrustAll\nServer = file://%s/x86_64\n" "${{ github.workspace }}" >> /etc/pacman.conf
          
          # 4. Setup builduser
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          
          # 5. Configure git safe directory
          git config --global --add safe.directory "${{ github.workspace }}"
          
          # 6. Change ownership - be explicit about what we change
          chown -R builduser:builduser x86_64 2>/dev/null || true
          chown -R builduser:builduser update-repo.sh 2>/dev/null || true

      - name: Sync AUR Packages
        run: |
          sudo -u builduser git config --global --add safe.directory "${{ github.workspace }}"
          
          cd "${{ github.workspace }}/x86_64"
          
          # Debug: Show what we're working with
          echo "=== Files in x86_64 ==="
          ls -la
          
          # 🔑 CRITICAL: Remove stale lock files first
          rm -f *.lck
          
          # Clean ALL old database files
          rm -f tornadoos-repo.db tornadoos-repo.db.tar.gz tornadoos-repo.files tornadoos-repo.files.tar.gz
          
          # Ensure builduser owns the directory
          sudo chown -R builduser:builduser .
          
          # Check if we have packages to add
          if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
            echo "✅ Found packages, building database..."
            # Rebuild database (creates .db.tar.gz format)
            sudo -u builduser repo-add tornadoos-repo.db.tar.gz *.pkg.tar.zst
            
            # Verify the database is valid
            echo "=== Database verification ==="
            file tornadoos-repo.db.tar.gz
            tar -tzf tornadoos-repo.db.tar.gz | head -3
          else
            echo "❌ ERROR: No .pkg.tar.zst files found in x86_64/"
            echo "Available files:"
            ls -la
            exit 1
          fi
          
          # Clean up lock files
          rm -f *.lck
          
          rm -f *.old

      - name: Push Updates
        run: |
          echo "=== Before Push ==="
          pwd
          ls -la "${{ github.workspace }}/x86_64"
          
          cd "${{ github.workspace }}"
          
          # Re-initialize git if .git is missing
          if [ ! -d ".git" ]; then
            echo "⚠️ .git folder missing, re-initializing..."
            git init
            git remote add origin https://github.com/LinuxWebMaster/tornadoos-repo.git
            git fetch origin main
            git reset --hard origin/main
          fi
          
          # Ensure .git is accessible
          chmod -R u+rwX .git
          
          git config --global --add safe.directory "${{ github.workspace }}"
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          
          # 🔑 CRITICAL: Only add specific files, NOT uncompressed .db
          cd x86_64
          git add *.pkg.tar.zst tornadoos-repo.db.tar.gz tornadoos-repo.files.tar.gz
          git rm -f tornadoos-repo.db tornadoos-repo.files *.lck 2>/dev/null || true
          cd ..
          
          if git commit -m "Automated AUR Update $(date +%Y-%m-%d)"; then
            git push https://${{ secrets.TOKEN_NAME }}@github.com/LinuxWebMaster/tornadoos-repo.git HEAD:main
          else
            echo "✅ No changes to commit, skipping push."
          fi