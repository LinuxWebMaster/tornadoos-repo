name: Update TornadoOS Repo
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows you to run it manually from the "Actions" tab

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm git base-devel aurutils sudo
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser

      - name: Update AUR Packages
        run: |
          # 1. Initialize repo context in your x86_64 folder
          # Replace 'tornadoos-repo' with your actual .db name if it's different
          sudo -u builduser aur repo --add ./x86_64/tornadoos-repo.db.tar.gz
          
          # 2. Sync and build updates
          sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm

      - name: Commit and Push
        run: |
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          git add x86_64/
          
          # Only commit if there are actually changes to push
          if git diff --staged --quiet; then
            echo "No updates found."
          else
            git commit -m "Automated AUR Update $(date +%Y-%m-%d)"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
          fi
