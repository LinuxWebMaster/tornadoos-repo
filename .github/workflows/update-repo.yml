name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup & Update
        run: |
          # 1. Install base tools
          pacman -Syu --noconfirm git base-devel sudo
          
          # 2. Tell pacman to use your OWN repo (which now contains aurutils)
          echo -e "\n[tornadoos-repo]\nSigLevel = Optional TrustAll\nServer = file://$GITHUB_WORKSPACE/x86_64" >> /etc/pacman.conf
          
          # 3. Install aurutils DIRECTLY from your repo
          pacman -Sy --noconfirm aurutils
          
          # 4. Setup builduser
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chown -R builduser:builduser .

      - name: Sync AUR Packages
        run: |
          sudo -u builduser aur repo --add ./x86_64/tornadoos-repo.db.tar.gz
          sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm
          rm -f x86_64/*.old

      - name: Push Updates
        run: |
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          git add x86_64/
          git commit -m "Automated AUR Update $(date +%Y-%m-%d)" || exit 0
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main